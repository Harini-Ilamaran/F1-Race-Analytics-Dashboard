<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Fantasy F1 Team Builder</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<div class="top-bar">
    <header>

        <img src="images/logo/f1-logo.png"
             alt="F1 Logo"
             class="header-logo">

        <h1 class="desktop-title">
            F1 Race Analytics Dashboard
        </h1>

        <h1 class="mobile-title">
            F1 Race Analytics
        </h1>

        <div class="menu-toggle" id="menuToggle">
            ☰
        </div>

    </header>

<nav id="navbar">

    <a href="index.html">Dashboard</a>
    <a href="constructors.html">Constructors</a>
    <a href="comparison.html">Driver Comparison</a>
    <a href="pitstop.html">Pit Strategy</a>
    <a href="fantasy.html">Fantasy Team</a>
    <a href="watchlive.html">Watch Live</a>

</nav>
</div>

<section class="page-banner">
    <h2>Fantasy Team Builder</h2>
    <p>
        Build your dream Formula 1 team.
    </p>

</section>

<section class="table-section">

    <h2>Budget: $100M</h2>

    <br>

    <select id="driver1">

    </select>

    <br><br>

    <select id="driver2">

    </select>

    <br><br>

    <select id="constructor">

        <option value="McLaren">McLaren</option>

        <option value="Ferrari">Ferrari</option>

        <option value="Mercedes">Mercedes</option>

        <option value="Red Bull Racing">Red Bull Racing</option>

        <option value="Aston Martin">Aston Martin</option>

        <option value="Alpine">Alpine</option>

        <option value="Haas">Haas</option>

        <option value="Williams">Williams</option>

        <option value="RB">RB</option>

        <option value="Kick Sauber">Kick Sauber</option>

    </select>

    <br><br>

    <button onclick="buildFantasyTeam()">
        Build Team
    </button>

</section>

<section class="leader-card">

    <h2>Fantasy Team Result</h2>

    <p id="fantasyResult">

        Waiting for team selection...

    </p>

</section>

<script src="js/fantasy.js"></script>
<script src="js/navigation.js"></script>
</body>
</html>
