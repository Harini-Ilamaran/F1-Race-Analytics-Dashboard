<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Driver Comparison</title>

    <link rel="stylesheet"
          href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="top-bar">
    <header>

        <img src="images/logo/f1-logo.png"
             alt="F1 Logo"
             class="header-logo">

        <h1 class="desktop-title">
            F1 Race Analytics Dashboard
        </h1>

        <h1 class="mobile-title">
            F1 Race Analytics
        </h1>

        <div class="menu-toggle" id="menuToggle">
            ☰
        </div>

    </header>

<nav id="navbar">

    <a href="index.html">Dashboard</a>
    <a href="constructors.html">Constructors</a>
    <a href="comparison.html">Driver Comparison</a>
    <a href="pitstop.html">Pit Strategy</a>
    <a href="fantasy.html">Fantasy Team</a>
    <a href="watchlive.html">Watch Live</a>

</nav>
</div>

<section class="page-hero">

    <div class="page-overlay">

        <h1>
            DRIVER
            <span>COMPARISON</span>
        </h1>

        <p>
            Compare Formula 1 drivers side by side
        </p>

    </div>

</section>

<section class="table-section">

    <div class="driver-picker-container">

        <div class="driver-picker">
            <select id="driver1"></select>
        </div>

        <div class="vs-badge">
            VS
        </div>

        <div class="driver-picker">
            <select id="driver2"></select>
        </div>

    </div>

    <div class="compare-btn-container">

        <button onclick="compareDrivers()">
            Compare Drivers
        </button>

    </div>

</section>

<section class="table-section">

    <div id="driverCards"></div>
    <div class="chart-card">
        <canvas id="comparisonChart"></canvas>
    </div>

    <div id="comparisonSummary"></div>

</section>

<script src="js/comparison.js"></script>
<script src="js/navigation.js"></script>
</body>
</html>
